name: Phase 31-01 SQL Patch — Transitions & Sunsets

on:
  workflow_dispatch: # Manual trigger only

jobs:
  run-patch:
    name: Create Transitions & Sunsets interest and migrate discussions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SQL patch via service role key
        run: node .github/scripts/run-sql-patch.js
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
